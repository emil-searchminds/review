name: Scrape

on:
  workflow_dispatch:
    inputs:
      batch_label:
        description: "Result file: results/batch-<label>.jsonl"
        type: string
        required: true
      worker_count:
        description: "Number of parallel workers (will be floored to 40 to keep per-worker runtime short)"
        type: number
        default: 40
      max_age_weeks:
        description: "Only flag 1-star reviews newer than N weeks"
        type: number
        default: 4
      workers_per_runner:
        description: "Concurrent browser contexts per runner"
        type: number
        default: 10
      retry_count:
        description: "How many times this batch has been auto-retried (internal use)"
        type: number
        default: 0

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      worker_count: ${{ steps.set.outputs.worker_count }}
    steps:
      - id: set
        run: |
          n=${{ inputs.worker_count }}
          # Floor at 40: shorter per-worker runtime keeps the headless browser
          # well below the ~2h death threshold we observed on the 2-core runners.
          if [ "$n" -lt 40 ]; then n=40; fi
          echo "matrix=$(seq 0 $((n-1)) | jq -Rsc 'split("\n")[:-1] | map(tonumber)')" >> "$GITHUB_OUTPUT"
          echo "worker_count=$n" >> "$GITHUB_OUTPUT"

  scrape:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk_index: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium

      - run: |
          python worker.py \
            --chunk-index ${{ matrix.chunk_index }} \
            --chunk-count ${{ needs.prepare.outputs.worker_count }} \
            --max-age-weeks ${{ inputs.max_age_weeks }} \
            --workers ${{ inputs.workers_per_runner }} \
            --batch-label ${{ inputs.batch_label }}

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk_index }}
          path: results/chunk-*.jsonl
          if-no-files-found: ignore

  aggregate:
    needs: scrape
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    outputs:
      err_pct: ${{ steps.stats.outputs.err_pct }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          path: results
          merge-multiple: true

      - run: python aggregate.py --out results/batch-${{ inputs.batch_label }}.jsonl

      - id: stats
        name: Compute error rate
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          path = f"results/batch-${{ inputs.batch_label }}.jsonl"
          total = errors = 0
          for line in open(path, encoding="utf-8"):
              line = line.strip()
              if not line: continue
              total += 1
              if json.loads(line).get("error"): errors += 1
          err_pct = (errors * 100 / total) if total else 0
          print(f"err_pct={err_pct:.2f}")
          print(f"  total={total}  errors={errors}  err_pct={err_pct:.2f}%", flush=True)
          PY

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/batch-${{ inputs.batch_label }}.jsonl
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "scrape: batch ${{ inputs.batch_label }} run ${{ github.run_id }} (errors: ${{ steps.stats.outputs.err_pct }}%)"
          git push

      - name: Trigger next batch (retry or advance)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current="${{ inputs.batch_label }}"
          err_pct="${{ steps.stats.outputs.err_pct }}"
          retry_count=${{ inputs.retry_count }}
          # Retry same batch if errors > 5% and we've retried <2 times.
          # Otherwise advance to the next batch.
          if awk "BEGIN{exit !($err_pct > 5)}" && [ "$retry_count" -lt 2 ]; then
            next="$current"
            next_retry=$((retry_count + 1))
            echo "→ retrying batch $current (attempt $next_retry, err_pct=$err_pct%)"
          else
            next=$(printf "%03d" $((10#$current + 1)))
            next_retry=0
            echo "→ advancing from $current to $next (err_pct=$err_pct%)"
          fi
          if [ -f "batches-public/batch-${next}.csv" ]; then
            gh workflow run scrape.yml \
              -f batch_label="${next}" \
              -f max_age_weeks=${{ inputs.max_age_weeks }} \
              -f workers_per_runner=${{ inputs.workers_per_runner }} \
              -f retry_count=${next_retry}
          else
            echo "no batches-public/batch-${next}.csv — chain complete"
          fi
