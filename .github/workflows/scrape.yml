name: Scrape

on:
  workflow_dispatch:
    inputs:
      batch_label:
        description: "Result file: results/batch-<label>.jsonl"
        type: string
        required: true
      worker_count:
        description: "Number of parallel workers"
        type: number
        default: 10
      max_age_weeks:
        description: "Only flag 1-star reviews newer than N weeks"
        type: number
        default: 4
      workers_per_runner:
        description: "Concurrent browser contexts per runner"
        type: number
        default: 10

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          n=${{ inputs.worker_count }}
          echo "matrix=$(seq 0 $((n-1)) | jq -Rsc 'split("\n")[:-1] | map(tonumber)')" >> "$GITHUB_OUTPUT"

  scrape:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk_index: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium

      - run: |
          python worker.py \
            --chunk-index ${{ matrix.chunk_index }} \
            --chunk-count ${{ inputs.worker_count }} \
            --max-age-weeks ${{ inputs.max_age_weeks }} \
            --workers ${{ inputs.workers_per_runner }} \
            --batch-label ${{ inputs.batch_label }}

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk_index }}
          path: results/chunk-*.jsonl
          if-no-files-found: ignore

  aggregate:
    needs: scrape
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          path: results
          merge-multiple: true

      - run: python aggregate.py --out results/batch-${{ inputs.batch_label }}.jsonl

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/batch-${{ inputs.batch_label }}.jsonl
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "scrape: batch ${{ inputs.batch_label }} (run ${{ github.run_id }})"
          git push

      - name: Trigger next batch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current="${{ inputs.batch_label }}"
          next=$(printf "%03d" $((10#$current + 1)))
          if [ -f "batches-public/batch-${next}.csv" ]; then
            echo "→ triggering batch ${next}"
            gh workflow run scrape.yml \
              -f batch_label="${next}" \
              -f worker_count=${{ inputs.worker_count }} \
              -f max_age_weeks=${{ inputs.max_age_weeks }} \
              -f workers_per_runner=${{ inputs.workers_per_runner }}
          else
            echo "no batches-public/batch-${next}.csv — chain complete"
          fi
